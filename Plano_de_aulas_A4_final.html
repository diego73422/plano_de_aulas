<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Plano de Aulas</title>

<style>
body{font-family:Times New Roman, serif;font-size:12px;margin:0;background:#eef2ff}

.header{display:flex;align-items:center;justify-content:space-between;padding:10px}
.header img{height:60px}
.title{text-align:center;flex:1}

.container{padding:15px}

.row{display:flex;gap:10px;margin-top:8px}
.col{flex:1}
.small-col{flex:0.5}

label{font-weight:bold;display:block;margin-bottom:3px;font-size:11px}

input,select,textarea{
width:100%;
border:none;
border-bottom:1px solid #000;
padding:4px;
font-size:12px;
font-family:Times New Roman, serif;
}

textarea{min-height:50px;resize:none;overflow:hidden}

.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:8px}

.aula{margin-top:15px;padding-bottom:10px;border-bottom:1px solid #000}

.datas{display:flex;gap:5px;align-items:center}

button{background:#1e40af;color:#fff;border:none;padding:5px;margin-top:10px;cursor:pointer;font-size:11px}
.delete{background:#dc2626}

@page {
  size: A4 portrait;
  margin: 10mm;
}

@media print{
button{display:none}
body{background:#fff;margin:10mm;zoom:0.92}

.grid3{
display:grid !important;
grid-template-columns:1fr 1fr 1fr;
}

.aula{
border:1px solid #000;
padding:8px;
margin-top:10px;
page-break-inside:avoid;
}

textarea{
border:1px solid #ccc;
height:auto !important;
overflow:visible !important;
white-space:pre-wrap;
}

}
</style>

<script>
function autoResize(el){
  el.style.height="auto";
  el.style.height=el.scrollHeight+"px";
}

function gerarPDF(){
  document.querySelectorAll("textarea").forEach(el=>{
    el.style.height="auto";
    el.style.height=el.scrollHeight+"px";
  });
  setTimeout(()=>{window.print();},400);
}

function addAula(){
let d=document.createElement("div");
d.className="aula";

d.innerHTML=`
<div class="datas">
<input type="date">
<button onclick="addDia(this)">+ dia</button>
</div>

<label>Habilidade / Aula</label>
<textarea oninput="autoResize(this)"></textarea>

<div class="grid3">
<div><label>Objetivo do Conhecimento</label><textarea oninput="autoResize(this)"></textarea></div>
<div><label>Objetivo</label><textarea oninput="autoResize(this)"></textarea></div>
<div><label>Conteúdo</label><textarea oninput="autoResize(this)"></textarea></div>
</div>

<div class="grid3">
<div><label>Estratégias</label><textarea oninput="autoResize(this)"></textarea></div>
<div><label>Recursos</label><textarea oninput="autoResize(this)"></textarea></div>
<div><label>Avaliação</label><textarea oninput="autoResize(this)"></textarea></div>
</div>

<button ondblclick="this.parentElement.remove()" class="delete">🗑️ Excluir aula</button>
`;

document.getElementById("aulas").appendChild(d);
}

function addDia(btn){
let c=btn.parentElement;
let i=document.createElement("input");
i.type="date";
c.insertBefore(i,btn);
c.appendChild(btn);
}
</script>

</head>
